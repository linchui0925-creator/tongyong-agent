# ==================================
# TongYong Agent 全局配置文件
# 可以直接复制为 config.toml 修改使用
# ==================================

# 基础配置
[base]
model = "gpt-4o"
model_provider = "openai"
model_reasoning_effort = "medium"
disable_response_storage = true
personality = "pragmatic"

# 供应商配置，和预设完全对齐，配置后无需前端手动添加
[model_providers]
# 1. OpenAI
[model_providers.openai]
name = "OpenAI Official"
base_url = "https://api.openai.com/v1"
api_key = "sk-xxx" # 替换为你的API Key
wire_api = "responses"
requires_openai_auth = true

# 2. 胜算云
[model_providers.sheng_suan_yun]
name = "胜算云"
base_url = "https://api.shengsuanyun.com/v1"
api_key = "xxx"
wire_api = "responses"
requires_openai_auth = true

# 3. PatewayAI
[model_providers.patewayai]
